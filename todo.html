<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <title>To-do List</title>
    <link rel="stylesheet" href="todo.css">
</head>

<body>
    <form>
        <table>
            <tr>
                <td><h1>To-Do List</h1></td>
            </tr>
            <tr>
                <td><h4>Add text - Click <u>Add</u> . To Delete - Click <u>Delete</u></h4></td>
            </tr>
            <tr>
                <td><input id="input" placeholder="Type your plans here..." class="input"><button type='button' class='button1' onclick="add()">Add</button></td>
                <td><button type="reset" class="button1">Clear</button></td>
            </tr>
        </table>
    </form>
    
    <ul id="list-container">
        <li>
            This is the sample text <button type="button" class='button2' onclick='remove(event)'>Delete</button>
        </li>
    </ul>
</body>


<script src="todo.js"></script>

</html>
